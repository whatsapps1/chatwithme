<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Clickable Image</title>

<style>
body {
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.card {
    width: 320px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

.title {
    background: white;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<a href="https://whatsapps-chats.blogspot.com/2026/04/my-whatsapp-number-for-video-call.html" target="_blank">

<div class="card">
    <img src="https://i.postimg.cc/dVGsXsR4/40333615-c897-4b5a-81fd-2dd98b2f37a1.png">
    <div class="title">Click Here</div>
</div>

</a>

</body>
</html>
